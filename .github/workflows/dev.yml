name: Development

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

jobs:
  dev:
    # Must use self-hosted runner — image is ~40GB with models baked in
    runs-on: container-builder

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set environment variables
        run: |
          DOCKERHUB_REPO="${{ vars.DOCKERHUB_REPO }}"
          DOCKERHUB_IMG="${{ vars.DOCKERHUB_IMG }}"
          HUGGINGFACE_ACCESS_TOKEN="${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}"
          RELEASE_VERSION="${GITHUB_REF##refs/heads/}"
          RELEASE_VERSION="${RELEASE_VERSION//\//-}"
          echo "DOCKERHUB_REPO=$DOCKERHUB_REPO" >> $GITHUB_ENV
          echo "DOCKERHUB_IMG=$DOCKERHUB_IMG" >> $GITHUB_ENV
          echo "HUGGINGFACE_ACCESS_TOKEN=$HUGGINGFACE_ACCESS_TOKEN" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      - name: Build and push the images to Docker Hub
        uses: docker/bake-action@v2
        with:
          push: true
          set: |
            *.args.DOCKERHUB_REPO=${{ env.DOCKERHUB_REPO }}
            *.args.DOCKERHUB_IMG=${{ env.DOCKERHUB_IMG }}
            *.args.RELEASE_VERSION=${{ env.RELEASE_VERSION }}
            *.args.HUGGINGFACE_ACCESS_TOKEN=${{ env.HUGGINGFACE_ACCESS_TOKEN }}
